<style scoped>
.map {
  position: relative;
  height: 240px;
  background: #050505;
  overflow: hidden;
}
.grid-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 30px 30px;
}
.point {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
  border-radius: 9999px;
}
.a { top: 28%; left: 20%; }
.b { top: 58%; left: 68%; }
.c { top: 36%; left: 48%; }
.curve {
  position: absolute;
  width: 220px;
  height: 110px;
  border-bottom: 2px dashed #4ade80;
  border-radius: 50%;
  animation: curve 2.4s infinite;
  opacity: 0;
}
.curve-1 { top: 25%; left: 18%; }
.curve-2 { top: 30%; left: 38%; transform: rotate(22deg); animation-delay: 1s; }
.shot-line {
  position: absolute;
  height: 2px;
  background: linear-gradient(90deg, transparent, #facc15, transparent);
  transform-origin: left;
  animation: shoot 1.8s infinite ease-in-out;
  opacity: 0;
}
.shot-1 { top: 30%; left: 21%; width: 170px; transform: rotate(18deg); }
.shot-2 { top: 42%; left: 49%; width: 140px; transform: rotate(38deg); animation-delay: 0.8s; }
.explosion {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 9999px;
  background: radial-gradient(circle, #facc15, transparent);
  animation: explode 1.2s infinite ease-out;
}
.explosion-1 { top: 57%; left: 68%; }
.explosion-2 { top: 35%; left: 48%; animation-delay: 0.6s; }
@keyframes curve { 0% { opacity: 0; } 50% { opacity: 0.8; } 100% { opacity: 0; } }
@keyframes shoot { 0% { opacity: 0; transform: scaleX(0); } 50% { opacity: 1; transform: scaleX(1); } 100% { opacity: 0; transform: scaleX(0); } }
@keyframes explode { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
</style>
